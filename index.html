<body>

  <div class="container">
    <h1>📊 월별 전력 수급 현황</h1>

```
<label>연도 선택: </label>
<select id="yearSelect"></select>

<canvas id="chart"></canvas>
```

  </div>

  <script>
    const csvFile = "HOME_전력수급_최대_최소전력월별평균(1).csv";

    let chart;
    let rawData = [];

    // CSV 로드
    Papa.parse(csvFile, {
      download: true,
      encoding: "EUC-KR",
      header: true,
      complete: function(results) {
        rawData = results.data;
        init();
      }
    });

    function init() {
      const yearSelect = document.getElementById("yearSelect");

      // 연도 목록 채우기
      rawData.forEach(row => {
        if(row["연도"]) {
          const option = document.createElement("option");
          option.value = row["연도"];
          option.textContent = row["연도"];
          yearSelect.appendChild(option);
        }
      });

      // 기본 첫 연도
      drawChart(rawData[0]);

      yearSelect.addEventListener("change", () => {
        const selected = rawData.find(d => d["연도"] == yearSelect.value);
        drawChart(selected);
      });
    }

    function drawChart(data) {
      const months = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
      const values = months.map(m => Number(data[m]));

      const ctx = document.getElementById("chart").getContext("2d");

      if(chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: months,
          datasets: [{
            label: data["연도"] + "년 전력 수급",
            data: values,
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.parsed.y.toLocaleString() + " MW";
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: false,
              ticks: {
                callback: function(value) {
                  return value.toLocaleString();
                }
              }
            }
          }
        }
      });
    }
  </script>

</body>
</html>
