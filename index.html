<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>월별 전력 수급 현황</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- CSV 파서 -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    select {
      padding: 8px;
      margin: 15px 0;
      font-size: 16px;
    }

    canvas {
      width: 100% !important;
      height: 500px !important;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>📊 월별 전력 수급 현황</h1>

  <label>연도 선택: </label>
  <select id="yearSelect"></select>

  <canvas id="chart"></canvas>
</div>

<script>
const csvFile = "HOME_전력수급_최대_최소전력월별평균(1).csv";

let chart;
let rawData = [];

// CSV 불러오기
Papa.parse(csvFile, {
  download: true,
  header: true,
  skipEmptyLines: true, // ⭐ 빈 줄 제거
  complete: function(results) {

    // ⭐ 컬럼 이름 공백 제거 + BOM 제거
    rawData = results.data.map(row => {
      const newRow = {};
      Object.keys(row).forEach(key => {
        const cleanKey = key.replace(/\uFEFF/g, "").trim();
        newRow[cleanKey] = row[key];
      });
      return newRow;
    });

    console.log("로드된 데이터:", rawData);
    init();
  }
});

// 초기화
function init() {
  const yearSelect = document.getElementById("yearSelect");

  // 유효한 데이터만
  const validData = rawData.filter(d => d["연도"]);

  // 연도 옵션 생성
  validData.forEach(row => {
    const option = document.createElement("option");
    option.value = row["연도"];
    option.textContent = row["연도"];
    yearSelect.appendChild(option);
  });

  drawChart(validData[0]);

  yearSelect.addEventListener("change", () => {
    const selected = validData.find(d => d["연도"] == yearSelect.value);
    drawChart(selected);
  });
}

// 숫자 변환 (콤마 제거)
function parseNumber(v) {
  if (!v) return null;
  return Number(v.toString().replace(/,/g, ""));
}

// 그래프 그리기
function drawChart(data) {
  if (!data) return;

  const months = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  const values = months.map(m => parseNumber(data[m]));

  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: months,
      datasets: [{
        label: data["연도"] + "년 전력",
        data: values,
        spanGaps: true, // ⭐ 빈 값 끊김 처리
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true
        },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y?.toLocaleString() + " MW"
          }
        }
      },
      scales: {
        y: {
          ticks: {
            callback: v => v.toLocaleString()
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
